<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Project - 2.1</title>

        <!-- Reset CSS -->
        <link rel="stylesheet" href="./assets/css/reset.css" />

        <!-- Embed Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Sen:wght@400..800&display=swap"
            rel="stylesheet"
        />

        <!-- Styles -->
        <link rel="stylesheet" href="./assets/css/style.css" />
    </head>
    <body>
        <!-- Header -->
        <header class="header fixed">
            <div class="content">
                <div class="body">
                    <!-- Logo -->
                    <a href="#!"
                        ><img src="./assets/icons/Logo.svg" alt="Besnik."
                    /></a>

                    <!-- Navigation -->
                    <nav class="navbar">
                        <ul class="li">
                            <a class="active" href="#!">Home</a>
                        </ul>
                        <ul class="li">
                            <a href="#!">Features</a>
                        </ul>
                        <ul class="li">
                            <a href="#!">Pricing</a>
                        </ul>
                        <ul class="li">
                            <a href="#!">About</a>
                        </ul>
                        <ul class="li">
                            <a href="#!">Contact</a>
                        </ul>
                    </nav>

                    <!-- Action -->
                    <div class="action">
                        <a class="action-link" href="#!">Sign in</a>
                        <a class="btn action-btn" href="#!">Sign up</a>
                    </div>
                </div>
            </div>
        </header>

        <main style="height: 10000px">
            <!-- Hero -->
            <div class="hero">
                <div class="content">
                    <div class="body">
                        <!-- Hero left -->
                        <div class="content-block">
                            <p class="tagline">😎 EASY LEAENING PLATFORM</p>
                            <h1 class="heading">Words learner come here.</h1>
                            <p class="desc">
                                Build skills with courses, certificates, and get
                                online knowledge from our world-class platform.
                            </p>
                            <div class="cta-group">
                                <a href="#!" class="btn cta-btn">Get Started</a>
                                <div class="icon">
                                    <button class="watch-video">
                                        <img
                                            src="./assets/icons/play.svg"
                                            alt=""
                                        />
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Hero right -->
                        <div class="media-block">
                            <img
                                src="./assets/img/hero.png"
                                alt="Words learner come here."
                                class="img"
                            />
                            <div class="hero-summary1">
                                <div class="icon-wrapper">
                                    <img
                                        src="./assets/icons/Book.svg"
                                        alt=""
                                        class="icon"
                                    />
                                </div>
                                <div class="info">
                                    <p class="title">Courses</p>
                                    <p class="sub-title">1000+</p>
                                </div>
                            </div>
                            <div class="hero-summary2">
                                <p class="title">Schedules</p>
                                <div class="bar">
                                    <div class="bar-fill"></div>
                                    <div class="bar-fill"></div>
                                    <div class="bar-fill"></div>
                                    <div class="bar-fill"></div>
                                </div>
                            </div>
                            <div class="hero-summary3">
                                <p class="title">Our Active Students</p>
                                <div class="avatar-group">
                                    <img
                                        src="./assets/img/hero-avatar-1.jpg"
                                        alt=""
                                        class="avatar"
                                    />
                                    <img
                                        src="./assets/img/hero-avatar-2.jpg"
                                        alt=""
                                        class="avatar"
                                    />
                                    <img
                                        src="./assets/img/hero-avatar-3.jpg"
                                        alt=""
                                        class="avatar"
                                    />
                                    <img
                                        src="./assets/img/hero-avatar-4.jpg"
                                        alt=""
                                        class="avatar"
                                    />
                                    <div class="avatar">10K+</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
